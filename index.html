<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор Skoda Octavia A5</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0OCIgZmlsbD0iI0ZGRkZGRiIgc3Ryb2tlPSIjNENBRjUwIiBzdHJva2Utd2lkdGg9IjQiLz48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSIzOCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjNENBRjUwIiBzdHJva2Utd2lkdGg9IjIiLz48cGF0aCBkPSJNNTAsMTUgQzYwLDI1IDcwLDM1IDcwLDUwIEM3MCw2NSA2MCw3NSA1MCw4NSBDNDAsNzUgMzAsNjUgMzAsNTAgQzMwLDM1IDQwLDI1IDUwLDE1IFoiIGZpbGw9IiM0Q0FGNTAiLz48cGF0aCBkPSJNNTAsMTUgTDY1LDQ1IEw1MCw0MCBMMzUsNDUgWiIgZmlsbD0iI0ZGRkZGRiIvPjxjaXJjbGUgY3g9IjUwIiBjeT0iMzAiIHI9IjQiIGZpbGw9IiNGRkZGRkYiLz48L3N2Zz4=">
    
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: #f4f6f9; margin: 0; padding: 15px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .calc-card { background: white; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); width: 100%; max-width: 460px; padding: 20px; border-top: 5px solid #4CAF50; }
        h2 { margin-top: 0; color: #2c3e50; font-size: 20px; text-align: center; margin-bottom: 5px; }
        .subtitle { font-size: 12px; color: #7f8c8d; text-align: center; margin-bottom: 15px; font-weight: bold; }
        .form-group { margin-bottom: 14px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #34495e; font-weight: 600; }
        select, input[type="number"] { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; outline: none; background: white; }
        select:focus, input:focus { border-color: #4CAF50; }
        .radio-group { display: flex; flex-direction: column; gap: 6px; }
        .radio-btn { display: flex; align-items: center; padding: 10px; border: 1px solid #e0e0e0; border-radius: 8px; cursor: pointer; }
        .radio-btn.active { border-color: #4CAF50; background-color: #e8f5e9; }
        .radio-btn input { margin-right: 10px; accent-color: #4CAF50; }
        .results { background: #f8f9fa; border-radius: 12px; padding: 16px; margin-top: 15px; border: 1px solid #eaeded; }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: #555; }
        .total-row { border-top: 1px solid #e0e0e0; padding-top: 10px; margin-top: 10px; font-size: 16px; color: #2c3e50; font-weight: bold; }
        .total-val { color: #4CAF50; font-size: 18px; }
        .tank-bar-bg { background: #e0e0e0; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 6px; }
        .tank-bar-fill { background: #4CAF50; height: 100%; width: 0%; transition: width 0.3s; }
        .trip-type { display: flex; gap: 10px; margin-top: 5px; }
        .btn-type { flex: 1; padding: 8px; border: 1px solid #ccc; background: #fff; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; text-align: center; }
        .btn-type.active { background: #4CAF50; color: white; border-color: #4CAF50; }
    </style>
</head>
<body>

<div class="calc-card">
    <h2>Калькулятор поездок</h2>
    <div class="subtitle">Из Димитровграда • Skoda Octavia A5 • Бак 55 л</div>
    
    <div class="form-group">
        <label>Выберите направление:</label>
        <select id="destination" onchange="selectCity()">
            <option value="240">Болгары (Татарстан) — ~120 км</option>
            <option value="170">Ульяновск — ~85 км</option>
            <option value="330">Самара — ~165 км</option>
            <option value="190">Тольятти — ~95 км</option>
            <option value="500">Казань — ~250 км</option>
            <option value="200">Сызрань — ~100 км</option>
            <option value="custom">Указать свои километры вручную</option>
        </select>
    </div>

    <div class="form-group">
        <label>Режим поездки:</label>
        <div class="trip-type">
            <button class="btn-type active" id="bt-double" onclick="setTripType(2, 'bt-double')">Туда и обратно</button>
            <button class="btn-type" id="bt-single" onclick="setTripType(1, 'bt-single')">Только в одну сторону</button>
        </div>
    </div>
    
    <div class="form-group">
        <label>Итоговая дистанция расчета (км):</label>
        <input type="number" id="distance" value="240" oninput="calculateCost()">
    </div>
    
    <div class="form-group">
        <label>Расход вашей Skoda (л/100 км):</label>
        <div class="radio-group">
            <label class="radio-btn active" id="rb1">
                <input type="radio" name="mode" value="6.2" checked onclick="setPreset(6.2, 'rb1')">
                <span>Трасса (6.2 л)</span>
            </label>
            <label class="radio-btn" id="rb2">
                <input type="radio" name="mode" value="7.4" onclick="setPreset(7.4, 'rb2')">
                <span>Смешанный (7.4 л)</span>
            </label>
            <label class="radio-btn" id="rb3">
                <input type="radio" name="mode" value="9.8" onclick="setPreset(9.8, 'rb3')">
                <span>Город / Пробки / Кондёр (9.8 л)</span>
            </label>
            <label class="radio-btn" id="rb4">
                <input type="radio" name="mode" value="custom" onclick="setPreset('custom', 'rb4')">
                <span>Свой расход: </span>
                <input type="number" id="custom_consumption" value="8.0" step="0.1" style="width: 70px; margin-left: auto; padding: 4px;" disabled oninput="calculateCost()">
            </label>
        </div>
    </div>
    
    <div class="form-group">
        <label>Цена за 1 литр АИ-95 (руб):</label>
        <input type="number" id="price" value="60" oninput="calculateCost()">
    </div>
    
    <div class="results">
        <div class="res-row">
            <span>Необходимо бензина:</span>
            <span id="liters-res" style="font-weight: bold;">0.00 л</span>
        </div>
        <div class="res-row">
            <span>Объем от бака Октавии:</span>
            <span id="tank-res" style="font-weight: bold;">0.0%</span>
        </div>
        <div class="tank-bar-bg"><div class="tank-bar-fill" id="tank-fill"></div></div>
        <div class="res-row total-row">
            <span>Итого стоимость топлива:</span>
            <span class="total-val" id="cost-res">0.00 руб.</span>
        </div>
    </div>
</div>

<script>
    let currentConsumption = 6.2;
    let tripMultiplier = 2;
    let baseCityDistance = 120;

    function selectCity() {
        const select = document.getElementById('destination');
        const distanceInput = document.getElementById('distance');
        if (select.value === 'custom') {
            distanceInput.disabled = false;
        } else {
            baseCityDistance = parseFloat(select.value) / 2;
            updateDistanceField();
        }
    }

    function setTripType(multiplier, id) {
        document.querySelectorAll('.btn-type').forEach(btn => btn.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        tripMultiplier = multiplier;
        const select = document.getElementById('destination');
        if (select.value !== 'custom') {
            updateDistanceField();
        } else {
            calculateCost();
        }
    }

    function updateDistanceField() {
        document.getElementById('distance').value = Math.round(baseCityDistance * tripMultiplier);
        calculateCost();
    }

    function setPreset(val, id) {
        document.querySelectorAll('.radio-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        const customInput = document.getElementById('custom_consumption');
        if (val === 'custom') {
            customInput.disabled = false;
            currentConsumption = parseFloat(customInput.value) || 0;
        } else {
            customInput.disabled = true;
            currentConsumption = parseFloat(val);
        }
        calculateCost();
    }

    function calculateCost() {
        const distance = parseFloat(document.getElementById('distance').value) || 0;
        const price = parseFloat(document.getElementById('price').value) || 0;
        const customInput = document.getElementById('custom_consumption');
        if (!customInput.disabled) currentConsumption = parseFloat(customInput.value) || 0;
        
        const litersNeeded = (distance * currentConsumption) / 100;
        const totalCost = litersNeeded * price;
        const tankPercentage = (litersNeeded / 55.0) * 100;
        
        document.getElementById('liters-res').innerText = litersNeeded.toFixed(2) + ' л';
        document.getElementById('cost-res').innerText = totalCost.toFixed(2) + ' руб.';
        document.getElementById('tank-res').innerText = tankPercentage.toFixed(1) + '%';
        
        const fillBar = document.getElementById('tank-fill');
        fillBar.style.width = Math.min(tankPercentage, 100) + '%';
        fillBar.style.backgroundColor = tankPercentage > 100 ? '#e74c3c' : '#4CAF50';
    }
    calculateCost();
</script>
</body>
</html>
