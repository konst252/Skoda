<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Навигатор-Калькулятор Skoda Octavia A5</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0OCIgZmlsbD0iI0ZGRkZGRiIgc3Ryb2tlPSIjNENBRjUwIiBzdHJva2Utd2lkdGg9IjQiLz48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSIzOCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjNENBRjUwIiBzdHJva2Utd2lkdGg9IjIiLz48Y2lyY2xlIGN4PSI1MCIgY3k9IjMwIiIgcj0iNCIgZmlsbD0iI0ZGRkZGRiIvPjwvc3ZnPg==">
    
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: #f4f6f9; margin: 0; padding: 10px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .calc-card { background: white; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); width: 100%; max-width: 480px; padding: 20px; border-top: 5px solid #4CAF50; }
        h2 { margin-top: 0; color: #2c3e50; font-size: 18px; text-align: center; margin-bottom: 5px; }
        .subtitle { font-size: 11px; color: #7f8c8d; text-align: center; margin-bottom: 15px; font-weight: bold; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-size: 13px; color: #34495e; font-weight: 600; }
        input[type="number"] { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; outline: none; background: #fff; }
        #map { width: 100%; height: 320px; border-radius: 12px; border: 1px solid #ccc; margin-bottom: 12px; z-index: 1; }
        .results { background: #f8f9fa; border-radius: 12px; padding: 14px; border: 1px solid #eaeded; }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; color: #555; }
        .total-row { border-top: 1px solid #e0e0e0; padding-top: 8px; margin-top: 8px; font-size: 15px; color: #2c3e50; font-weight: bold; }
        .total-val { color: #4CAF50; font-size: 16px; }
        .checkbox-container { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; font-size: 13px; color: #555; }
        .checkbox-container input { accent-color: #4CAF50; width: 16px; height: 16px; }
        .hint { font-size: 11px; color: #95a5a6; text-align: center; margin-top: -5px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="calc-card">
    <h2>Навигатор-Калькулятор</h2>
    <div class="subtitle">Skoda Octavia A5 • Бак 55 л</div>
    
    <div class="hint">Просто нажмите пальцем на карту, чтобы проложить маршрут</div>
    <div id="map"></div>

    <div class="checkbox-container">
        <input type="checkbox" id="round-trip" checked onchange="recalculateTrip()">
        <label for="round-trip" style="display:inline; font-weight:normal; margin:0;">Считать расстояние туда и обратно</label>
    </div>
    
    <div class="form-group">
        <label>Дистанция маршрута (км):</label>
        <input type="number" id="distance" value="0" oninput="calculateCost()">
    </div>
    
    <div class="form-group">
        <label>Цена за 1 литр АИ-95 (руб):</label>
        <input type="number" id="price" value="60" oninput="calculateCost()">
    </div>
    
    <div class="results">
        <div class="res-row"><span>Необходимо бензина:</span><span id="liters-res" style="font-weight: bold;">0.0 л</span></div>
        <div class="res-row total-row"><span>Итого стоимость:</span><span class="total-val" id="cost-res">0 руб.</span></div>
    </div>
</div>

<script>
    let map;
    let startMarker;
    let targetMarker;
    let routeLine = null;
    let rawDistanceKm = 0;
    
    const startPoint = [54.2138, 49.6125]; // Димитровград

    // Инициализация карты
    map = L.map('map').setView(startPoint, 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // Стартовый маркер
    startMarker = L.marker(startPoint).addTo(map).bindPopup("Димитровград (Старт)").openPopup();

    // Клик по карте
    map.on('click', function(e) {
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;
        
        // Ставим или двигаем маркер финиша
        if (targetMarker) {
            targetMarker.setLatLng(e.latlng);
        } else {
            targetMarker = L.marker(e.latlng).addTo(map);
        }
        
        getRoute(lat, lng);
    });

    // Запрос маршрута у дорожного движка OSRM
    function getRoute(toLat, toLng) {
        const url = `https://router.project-osrm.org/route/v1/driving/${startPoint[1]},${startPoint[0]};${toLng},${toLat}?overview=full&geometries=geojson`;
        
        fetch(url)
            .then(response => response.json())
            .then(data => {
                if (data.code === 'Ok' && data.routes.length > 0) {
                    const route = data.routes[0];
                    rawDistanceKm = route.distance / 1000; // перевод метров в км
                    
                    // Рисуем линию на карте
                    if (routeLine) {
                        map.removeLayer(routeLine);
                    }
                    routeLine = L.geoJSON(route.geometry, {
                        style: { color: '#3a86ff', weight: 5, opacity: 0.7 }
                    }).addTo(map);
                    
                    recalculateTrip();
                } else {
                    alert('Не удалось проложить автомобильный путь до этой точки.');
                }
            })
            .catch(err => {
                alert('Ошибка сети при расчете пути.');
            });
    }

    function recalculateTrip() {
        let finalDistance = rawDistanceKm;
        if (document.getElementById('round-trip').checked) {
            finalDistance = rawDistanceKm * 2;
        }
        document.getElementById('distance').value = Math.round(finalDistance);
        calculateCost();
    }

    function calculateCost() {
        const distance = parseFloat(document.getElementById('distance').value) || 0;
        const price = parseFloat(document.getElementById('price').value) || 0;
        const consumption = 6.2; // Расход Октавии по трассе
        
        const litersNeeded = (distance * consumption) / 100;
        const totalCost = litersNeeded * price;
        
        document.getElementById('liters-res').innerText = litersNeeded.toFixed(1) + ' л';
        document.getElementById('cost-res').innerText = Math.round(totalCost) + ' руб.';
    }
</script>
</body>
</html>
