<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бортовой Калькулятор Skoda Octavia A5</title>
    
    <!-- Подключаем Leaflet (Карты) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <!-- Встроенная иконка -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0OCIgZmlsbD0iI0ZGRkZGRiIgc3Ryb2tlPSIjNENBRjUwIiBzdHJva2Utd2lkdGg9IjQiLz48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSIzOCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjNENBRjUwIiBzdHJva2Utd2lkdGg9IjIiLz48Y2lyY2xlIGN4PSI1MCIgY3k9IjMwIiIgcj0iNCIgZmlsbD0iI0ZGRkZGRiIvPjwvc3ZnPg==">
    
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: #f4f6f9; margin: 0; padding: 10px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .calc-card { background: white; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); width: 100%; max-width: 480px; padding: 20px; border-top: 5px solid #4CAF50; }
        h2 { margin-top: 0; color: #2c3e50; font-size: 18px; text-align: center; margin-bottom: 5px; }
        .subtitle { font-size: 11px; color: #7f8c8d; text-align: center; margin-bottom: 15px; font-weight: bold; }
        .form-group { margin-bottom: 14px; background: #fdfdfd; padding: 10px; border-radius: 8px; border: 1px solid #f0f0f0; }
        label { display: block; margin-bottom: 6px; font-size: 13px; color: #34495e; font-weight: 600; }
        input[type="number"], range { width: 100%; }
        input[type="number"] { padding: 8px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; outline: none; }
        #map { width: 100%; height: 280px; border-radius: 12px; border: 1px solid #ccc; margin-bottom: 12px; z-index: 1; }
        
        .flex-group { display: flex; gap: 8px; margin-top: 4px; }
        .btn-mode { flex: 1; padding: 8px 4px; border: 1px solid #ccc; background: #fff; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; text-align: center; }
        .btn-mode.active { background: #4CAF50; color: white; border-color: #4CAF50; }
        
        .slider-container { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #555; margin-top: 5px; }
        input[type="range"] { accent-color: #4CAF50; cursor: pointer; }

        .results { background: #e8f5e9; border-radius: 12px; padding: 14px; border: 1px solid #c8e6c9; }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; color: #333; }
        .total-row { border-top: 1px solid #a5d6a7; padding-top: 8px; margin-top: 8px; font-size: 15px; color: #1b5e20; font-weight: bold; }
        .total-val { color: #2e7d32; font-size: 18px; }
        
        .checkbox-container { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #34495e; }
        .checkbox-container input { accent-color: #4CAF50; width: 16px; height: 16px; }
        .auto-badge { font-size: 10px; background: #e3f2fd; color: #1e88e5; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="calc-card">
    <h2>Бортовой Калькулятор Октавии</h2>
    <div class="subtitle">Димитровград • Авто-определение типа дорог</div>
    
    <div id="map"></div>

    <div class="form-group checkbox-container" style="border:none; padding:0; margin-bottom:10px;">
        <input type="checkbox" id="round-trip" checked onchange="recalculateTrip()">
        <label for="round-trip" style="display:inline; font-weight:normal; margin:0;">Считать расстояние туда и обратно</label>
    </div>

    <!-- БЛОК РАСХОДА С АВТООПРЕДЕЛЕНИЕМ -->
    <div class="form-group">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <label style="margin: 0;">Разделение маршрута:</label>
            <span class="auto-badge" id="auto-status">Расчет вручную</span>
        </div>
        <input type="range" id="route-ratio" min="0" max="100" value="15" oninput="manualRatioUpdate(this.value)">
        <div class="slider-container">
            <span id="label-highway">Трасса: 85%</span>
            <span id="label-city">Город: 15%</span>
        </div>
    </div>

    <div class="form-group">
        <label>Режим скорости на трассе:</label>
        <div class="flex-group">
            <button class="btn-mode" id="speed-eco" onclick="setSpeedMode('eco')">Эко (90 км/ч)<br>~5.5 л</button>
            <button class="btn-mode active" id="speed-std" onclick="setSpeedMode('std')">Обычный (110 км/ч)<br>~6.2 л</button>
            <button class="btn-mode" id="speed-fast" onclick="setSpeedMode('fast')">Спешу (130+ км/ч)<br>~7.8 л</button>
        </div>
    </div>

    <div class="form-group checkbox-container">
        <input type="checkbox" id="traffic-jam" onchange="calculateCost()">
        <label for="traffic-jam" style="display:inline; font-weight:normal; margin:0;">Учесть пробки / кондиционер (+1.5 л к городу)</label>
    </div>

    <div class="form-group" style="display: flex; gap: 10px; border: none; padding: 0;">
        <div style="flex: 1;">
            <label>Дистанция (км):</label>
            <input type="number" id="distance" value="0" oninput="calculateCost()">
        </div>
        <div style="flex: 1;">
            <label>Цена 95-го (руб):</label>
            <input type="number" id="price" value="60" oninput="calculateCost()">
        </div>
    </div>
    
    <div class="results">
        <div class="res-row"><span>Расчетный средний расход:</span><span id="calc-consumption" style="font-weight:bold;">6.4 л/100 км</span></div>
        <div class="res-row"><span>Понадобится топлива:</span><span id="liters-res" style="font-weight: bold;">0.0 л</span></div>
        <div class="res-row total-row"><span>Итого на поездку:</span><span class="total-val" id="cost-res">0 руб.</span></div>
    </div>
</div>

<script>
    let map;
    let targetMarker;
    let routeLine = null;
    let rawDistanceKm = 0;
    
    let highwayLossPreset = 6.2;
    let cityLossBase = 9.2;
    let cityRatio = 0.15;

    const startPoint = [54.2138, 49.6125]; // Димитровград

    map = L.map('map').setView(startPoint, 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.marker(startPoint).addTo(map).bindPopup("Димитровград (Старт)");

    L.Control.geocoder({
        defaultMarkGeocode: false,
        placeholder: "Поиск города/адреса...",
        errorMessage: "Не найдено"
    })
    .on('markgeocode', function(e) {
        const center = e.geocode.center;
        if (targetMarker) targetMarker.setLatLng(center);
        else targetMarker = L.marker(center).addTo(map);
        getRoute(center.lat, center.lng);
    })
    .addTo(map);

    map.on('click', function(e) {
        if (targetMarker) targetMarker.setLatLng(e.latlng);
        else targetMarker = L.marker(e.latlng).addTo(map);
        getRoute(e.latlng.lat, e.latlng.lng);
    });

    function getRoute(toLat, toLng) {
        const url = `https://router.project-osrm.org/route/v1/driving/${startPoint[1]},${startPoint[0]};${toLng},${toLat}?overview=full&geometries=geojson`;
        
        fetch(url)
            .then(response => response.json())
            .then(data => {
                if (data.code === 'Ok' && data.routes.length > 0) {
                    const route = data.routes[0];
                    rawDistanceKm = route.distance / 1000;
                    
                    if (routeLine) map.removeLayer(routeLine);
                    routeLine = L.geoJSON(route.geometry, { style: { color: '#4CAF50', weight: 5, opacity: 0.8 } }).addTo(map);
                    map.fitBounds(routeLine.getBounds(), { padding: [40, 40] });
                    
                    // Автоматически определяем пропорции на основе длины пути ТОЛЬКО В ОДНУ СТОРОНУ
                    autoDetermineRatio(rawDistanceKm);
                    recalculateTrip();
                }
            });
    }

    // УМНАЯ АВТОМАТИКА РАСПРЕДЕЛЕНИЯ ДОРОГИ
    function autoDetermineRatio(oneWayDistance) {
        let calculatedCityPercent = 15; // базовый дефолт
        
        if (oneWayDistance <= 15) {
            calculatedCityPercent = 90; // Короткая поездка — почти всё город
        } else if (oneWayDistance <= 40) {
            calculatedCityPercent = 40; // Пригород
        } else if (oneWayDistance <= 100) {
            calculatedCityPercent = 15; // Средняя дистанция (например, Ульяновск)
        } else {
            calculatedCityPercent = 8;  // Дальняя трасса (Самара, Казань)
        }
        
        cityRatio = calculatedCityPercent / 100;
        
        // Обновляем ползунок на экране
        document.getElementById('route-ratio').value = calculatedCityPercent;
        document.getElementById('label-city').innerText = `Город: ${calculatedCityPercent}%`;
        document.getElementById('label-highway').innerText = `Трасса: ${100 - calculatedCityPercent}%`;
        document.getElementById('auto-status').innerText = "Определено по карте";
        document.getElementById('auto-status').style.background = "#e8f5e9";
        document.getElementById('auto-status').style.color = "#2e7d32";
    }

    function manualRatioUpdate(value) {
        cityRatio = value / 100;
        document.getElementById('label-city').innerText = `Город: ${value}%`;
        document.getElementById('label-highway').innerText = `Трасса: ${100 - value}%`;
        document.getElementById('auto-status').innerText = "Изменено вручную";
        document.getElementById('auto-status').style.background = "#fff3e0";
        document.getElementById('auto-status').style.color = "#ef6c00";
        calculateCost();
    }

    function setSpeedMode(mode) {
        document.querySelectorAll('.btn-mode').forEach(btn => btn.classList.remove('active'));
        if (mode === 'eco') highwayLossPreset = 5.5, document.getElementById('speed-eco').classList.add('active');
        if (mode === 'std') highwayLossPreset = 6.2, document.getElementById('speed-std').classList.add('active');
        if (mode === 'fast') highwayLossPreset = 7.8, document.getElementById('speed-fast').classList.add('active');
        calculateCost();
    }

    function recalculateTrip() {
        let finalDistance = rawDistanceKm;
        if (document.getElementById('round-trip').checked) finalDistance = rawDistanceKm * 2;
        document.getElementById('distance').value = Math.round(finalDistance);
        calculateCost();
    }

    function calculateCost() {
        const distance = parseFloat(document.getElementById('distance').value) || 0;
        const price = parseFloat(document.getElementById('price').value) || 0;
        
        let currentCityLoss = cityLossBase;
        if (document.getElementById('traffic-jam').checked) currentCityLoss += 1.5;

        const averageConsumption = (highwayLossPreset * (1 - cityRatio)) + (currentCityLoss * cityRatio);
        const litersNeeded = (distance * averageConsumption) / 100;
        const totalCost = litersNeeded * price;
        
        document.getElementById('calc-consumption').innerText = averageConsumption.toFixed(1) + ' л/100 км';
        document.getElementById('liters-res').innerText = litersNeeded.toFixed(1) + ' л';
        document.getElementById('cost-res').innerText = Math.round(totalCost) + ' руб.';
    }
</script>
</body>
</html>
